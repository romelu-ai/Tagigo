<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>多義語フラッシュカード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--bg2:#12151f;--card:#181c2a;--card2:#1e2336;
  --border:#252d42;--border2:#2e3850;--text:#e8eaf6;--muted:#5a6580;--muted2:#8892b0;
  --accent:#7c9ef8;--gold:#f5c842;--gold-dim:rgba(245,200,66,0.15);
  --red:#ff6b7a;--red-dim:rgba(255,107,122,0.12);
  --blue:#6c8fff;--blue-dim:rgba(108,143,255,0.12);
  --green:#3dd68c;--green-dim:rgba(61,214,140,0.12);
  --purple:#b57bee;--r:12px;
}
html{font-size:16px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ===== HEADER ===== */
#header{
position:sticky;top:0;z-index:50;
background:rgba(12,14,20,0.97);backdrop-filter:blur(12px);
border-bottom:1px solid var(–border);
padding:0 12px;height:auto;min-height:48px;
display:flex;flex-direction:column;gap:0;
}
.hdr-top{
display:flex;align-items:center;gap:8px;
min-height:48px;flex-wrap:wrap;
}
.logo{font-family:‘Playfair Display’,serif;font-size:1rem;font-weight:700;color:var(–gold);white-space:nowrap;flex-shrink:0}
.logo em{font-style:italic;color:var(–accent);font-size:0.8em;margin-left:3px}
.hpill{font-family:‘Fira Code’,monospace;font-size:0.68rem;color:var(–muted2);background:var(–card);border:1px solid var(–border);border-radius:20px;padding:2px 8px;white-space:nowrap}
.hpill b{color:var(–accent)}
.hdr-r{margin-left:auto;display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}

.btn{
display:inline-flex;align-items:center;gap:4px;
background:var(–card);border:1px solid var(–border2);border-radius:8px;
padding:7px 11px;color:var(–muted2);
font-family:‘Noto Sans JP’,sans-serif;font-size:0.78rem;
cursor:pointer;transition:all 0.15s;white-space:nowrap;line-height:1;
min-height:36px;-webkit-tap-highlight-color:transparent;
}
.btn:hover,.btn:active{border-color:var(–accent);color:var(–accent);background:rgba(124,158,248,0.1)}
.btn-gold{background:linear-gradient(135deg,#b8940a,#f5c842);border-color:#f5c842;color:#1a1000;font-weight:700}
.btn-gold:hover,.btn-gold:active{opacity:0.88;color:#1a1000;background:linear-gradient(135deg,#b8940a,#f5c842)}
.btn-purple{background:rgba(181,123,238,0.15);border-color:rgba(181,123,238,0.5);color:var(–purple)}
.btn-purple:hover,.btn-purple:active{background:rgba(181,123,238,0.28);color:var(–purple);border-color:var(–purple)}
.btn-sm{padding:6px 10px;font-size:0.75rem;border-radius:6px;min-height:32px}

/* ===== CONTROLS ===== */
#controls{
background:var(–bg2);border-bottom:1px solid var(–border);
padding:8px 12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;
}
.sbox{position:relative;flex:1;min-width:130px;max-width:260px}
.sbox svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(–muted);pointer-events:none}
input[type=“text”]{
width:100%;background:var(–card);border:1px solid var(–border2);border-radius:8px;
padding:8px 10px 8px 30px;color:var(–text);
font-family:‘Noto Sans JP’,sans-serif;font-size:0.82rem;
outline:none;transition:border-color 0.18s;
-webkit-appearance:none;
}
input[type=“text”]:focus{border-color:var(–accent)}
input[type=“text”]::placeholder{color:var(–muted)}
.filter-row{display:flex;gap:4px;flex-wrap:wrap}
.fbtn{
background:var(–card);border:1px solid var(–border);border-radius:6px;
padding:5px 10px;color:var(–muted2);font-size:0.72rem;
cursor:pointer;font-family:‘Noto Sans JP’,sans-serif;
transition:all 0.15s;white-space:nowrap;
min-height:32px;-webkit-tap-highlight-color:transparent;
}
.fbtn.on{border-color:var(–accent);color:var(–accent);background:rgba(124,158,248,0.1)}
.fbtn.fl.on{border-color:var(–red);color:var(–red);background:var(–red-dim)}
.fbtn.fm.on{border-color:var(–gold);color:var(–gold);background:var(–gold-dim)}
.fbtn.fd.on{border-color:var(–blue);color:var(–blue);background:var(–blue-dim)}

/* ===== SECTION BAR ===== */
#sec-bar{
background:var(–bg2);border-bottom:1px solid var(–border);
padding:6px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;
display:flex;gap:4px;align-items:center;flex-wrap:nowrap;
}
#sec-bar::-webkit-scrollbar{height:3px}
#sec-bar::-webkit-scrollbar-thumb{background:var(–border2);border-radius:2px}
.sec-label{font-family:‘Fira Code’,monospace;font-size:0.68rem;color:var(–muted);white-space:nowrap;flex-shrink:0;margin-right:2px}
.sec-btn{
font-family:‘Fira Code’,monospace;font-size:0.62rem;
background:var(–card);border:1px solid var(–border);border-radius:5px;
padding:3px 6px;color:var(–muted2);cursor:pointer;white-space:nowrap;
flex-shrink:0;transition:all 0.15s;line-height:1.3;text-align:center;
min-height:32px;-webkit-tap-highlight-color:transparent;
}
.sec-btn:hover,.sec-btn:active{border-color:var(–accent);color:var(–accent)}
.sec-btn.on{border-color:var(–gold);color:var(–gold);background:var(–gold-dim)}

/* ===== STATUS ===== */
#statusbar{padding:6px 12px;font-family:‘Fira Code’,monospace;font-size:0.7rem;color:var(–muted)}

/* ===== LIST VIEW ===== */
#list-view{
max-width:900px;margin:0 auto;
padding:8px 10px 80px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:6px;
}
@media(max-width:480px){
#list-view{grid-template-columns:1fr 1fr;gap:5px;padding:6px 8px 80px;}
}
@media(max-width:320px){
#list-view{grid-template-columns:1fr;}
}

.wcard{background:var(–card);border:1px solid var(–border);border-radius:var(–r);padding:11px 13px;transition:all 0.18s;position:relative;overflow:hidden;cursor:default;}
.wcard::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.2s}
.wcard.st-learned::before{background:var(–red);opacity:1}
.wcard.st-maybe::before{background:var(–gold);opacity:1}
.wcard.st-difficult::before{background:var(–blue);opacity:1}
.wcard:hover{border-color:var(–border2);background:var(–card2)}
.wc-header{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.wc-header:hover .wc-en,.wc-header:active .wc-en{color:var(–accent)}
.wc-top{display:flex;align-items:flex-start;gap:6px}
.wc-en{font-family:‘Playfair Display’,serif;font-size:1rem;font-weight:700;color:var(–text);flex:1;line-height:1.2;transition:color 0.15s}
.wc-cnt{font-family:‘Fira Code’,monospace;font-size:0.6rem;color:var(–accent);background:rgba(124,158,248,0.12);border:1px solid rgba(124,158,248,0.25);border-radius:10px;padding:2px 5px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.wc-toggle{font-size:0.62rem;color:var(–muted);flex-shrink:0;margin-top:4px}
.wc-detail{padding-top:8px;border-top:1px solid var(–border);margin-top:8px;display:flex;flex-direction:column;gap:8px}
.wc-meaning-row{padding:7px 0;border-bottom:1px solid var(–border)}
.wc-meaning-row:last-child{border-bottom:none;padding-bottom:0}
.wc-mi-wrap{display:flex;gap:5px;align-items:baseline;margin-bottom:4px}
.wc-mnum{font-family:‘Fira Code’,monospace;font-size:0.6rem;color:var(–accent);flex-shrink:0}
.wc-mtext{font-size:0.76rem;color:var(–muted2);line-height:1.5}
.wc-ex-en{font-size:0.72rem;color:var(–text);font-style:italic;margin:3px 0 5px 13px;padding:4px 7px;background:rgba(124,158,248,0.06);border-left:2px solid var(–accent);border-radius:0 4px 4px 0;line-height:1.5}
.wc-mk-row{display:flex;gap:4px;flex-wrap:wrap;margin-left:13px}
.mkb{font-size:0.65rem;padding:4px 8px;border-radius:4px;cursor:pointer;font-family:‘Noto Sans JP’,sans-serif;border:1px solid;transition:all 0.15s;white-space:nowrap;min-height:28px;-webkit-tap-highlight-color:transparent;}
.mkb-ok{color:var(–red);border-color:rgba(255,107,122,0.4);background:var(–red-dim)}.mkb-ok.on,.mkb-ok:active{background:rgba(255,107,122,0.28)}
.mkb-maybe{color:var(–gold);border-color:rgba(245,200,66,0.4);background:var(–gold-dim)}.mkb-maybe.on,.mkb-maybe:active{background:rgba(245,200,66,0.28)}
.mkb-ng{color:var(–blue);border-color:rgba(108,143,255,0.4);background:var(–blue-dim)}.mkb-ng.on,.mkb-ng:active{background:rgba(108,143,255,0.28)}

/* ===== OVERLAY BASE ===== */
.overlay{
display:none;position:fixed;top:0;left:0;right:0;bottom:0;
background:#0c0e14;z-index:99999;flex-direction:column;overflow:hidden;
}
.ov-header{
display:flex;align-items:center;gap:6px;
padding:8px 12px;border-bottom:1px solid var(–border);
background:#12151f;flex-shrink:0;flex-wrap:wrap;
min-height:48px;
}
.ov-title{font-size:0.8rem;color:var(–muted2);white-space:nowrap;flex-shrink:0}
.ov-ctr{font-family:‘Fira Code’,monospace;font-size:0.74rem;color:var(–muted2)}
.pbar{height:3px;background:var(–border);flex-shrink:0}
.pfill{height:100%;background:linear-gradient(90deg,var(–accent),var(–purple));transition:width 0.3s}
.ov-body{
flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;
padding:12px 12px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;gap:10px;
}

/* ===== FLASHCARD ===== */
/* FC: 意味をまとめて1枚に表示 */
.fc-card{
width:100%;max-width:520px;flex-shrink:0;
background:var(–card);border:1px solid var(–border2);
border-radius:16px;padding:24px 20px 18px;text-align:center;
cursor:pointer;transition:border-color 0.2s;
position:relative;user-select:none;overflow:hidden;
-webkit-tap-highlight-color:transparent;
}
.fc-card:active{opacity:0.95}
.fc-card:hover{border-color:var(–accent)}
.fc-pos{position:absolute;top:10px;left:12px;font-family:‘Fira Code’,monospace;font-size:0.6rem;color:var(–muted)}
.fc-hint{position:absolute;bottom:9px;right:11px;font-size:0.6rem;color:var(–muted)}
.fc-word{font-family:‘Playfair Display’,serif;font-size:1.75rem;font-weight:700;color:var(–text);line-height:1.2;margin-bottom:6px}
.fc-badge{display:inline-block;font-family:‘Fira Code’,monospace;font-size:0.63rem;color:var(–accent);border:1px solid rgba(124,158,248,0.3);border-radius:10px;padding:2px 8px;margin-bottom:10px}

/* 意味リスト (全部まとめて) */
.fc-meanings{
display:none;text-align:left;margin-top:4px;
}
.fc-meanings.show{display:block}
.fc-meaning-item{
display:flex;gap:6px;align-items:baseline;
padding:5px 0;border-bottom:1px solid var(–border);
font-size:0.84rem;color:var(–muted2);line-height:1.55;
}
.fc-meaning-item:last-child{border-bottom:none}
.fc-mnum{font-family:‘Fira Code’,monospace;font-size:0.6rem;color:var(–accent);flex-shrink:0;margin-top:2px}
.fc-mtext{flex:1}

.fc-fb{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;border-radius:16px;z-index:10}
.fc-fb.show{animation:fbFade 0.65s ease-out forwards}
.fc-fb.l{background:rgba(255,107,122,0.1)}.fc-fb.m{background:rgba(245,200,66,0.1)}.fc-fb.d{background:rgba(108,143,255,0.1)}
.fc-fbsym{font-size:4rem;line-height:1;animation:symPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
.fc-fb.l .fc-fbsym{color:var(–red)}.fc-fb.m .fc-fbsym{color:var(–gold)}.fc-fb.d .fc-fbsym{color:var(–blue)}
@keyframes fbFade{0%{opacity:1}60%{opacity:1}100%{opacity:0}}
@keyframes symPop{0%{transform:scale(0.2);opacity:0}60%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}

/* FC アクションボタン */
.fc-acts{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;flex-shrink:0;width:100%;max-width:520px}
.fc-btn{
border-radius:10px;padding:10px 14px;font-size:0.82rem;
cursor:pointer;font-family:‘Noto Sans JP’,sans-serif;
transition:background 0.15s;border:1px solid;flex-shrink:0;
min-height:44px;-webkit-tap-highlight-color:transparent;
}
.fbok{background:var(–red-dim);border-color:rgba(255,107,122,0.4);color:var(–red)}.fbok:active{background:rgba(255,107,122,0.28)}
.fbmaybe{background:var(–gold-dim);border-color:rgba(245,200,66,0.4);color:var(–gold)}.fbmaybe:active{background:rgba(245,200,66,0.28)}
.fbng{background:var(–blue-dim);border-color:rgba(108,143,255,0.4);color:var(–blue)}.fbng:active{background:rgba(108,143,255,0.28)}
.fbskip{background:var(–card);border-color:var(–border2);color:var(–muted2)}.fbskip:active{border-color:var(–accent);color:var(–accent)}

.fc-nav{display:flex;gap:6px;justify-content:center;flex-shrink:0;flex-wrap:wrap}
.fc-kbd{font-size:0.62rem;color:var(–muted);text-align:center;flex-shrink:0;padding-bottom:4px}
kbd{background:var(–card);border:1px solid var(–border2);border-radius:4px;padding:1px 5px;font-family:‘Fira Code’,monospace;font-size:0.62rem;color:var(–muted2)}

/* スマホではキーボードヒント非表示 */
@media(max-width:600px){.fc-kbd{display:none}}

/* ===== QUIZ MODE ===== */
.qz-card{
width:100%;max-width:520px;flex-shrink:0;
background:var(–card);border:1px solid var(–border2);
border-radius:16px;padding:18px 16px;position:relative;overflow:hidden;
}
.qz-ex-en{font-size:0.95rem;color:var(–text);line-height:1.65;font-style:italic;margin-bottom:4px}
.qz-ex-ja{font-size:0.75rem;color:var(–muted2);margin-bottom:10px}
.qz-word{font-family:‘Playfair Display’,serif;font-size:1.4rem;font-weight:700;color:var(–text);margin-bottom:12px}
.qz-choices{display:flex;flex-direction:column;gap:7px;width:100%;max-width:520px;flex-shrink:0}
.qz-choice{
background:var(–card);border:1px solid var(–border2);border-radius:10px;
padding:11px 14px;cursor:pointer;font-family:‘Noto Sans JP’,sans-serif;
font-size:0.84rem;color:var(–text);transition:all 0.15s;text-align:left;
min-height:44px;-webkit-tap-highlight-color:transparent;
}
.qz-choice:active{border-color:var(–accent);background:rgba(124,158,248,0.08)}
.qz-choice.correct{border-color:var(–green);background:var(–green-dim);color:var(–green)}
.qz-choice.wrong{border-color:var(–red);background:var(–red-dim);color:var(–red)}
.qz-choice.reveal{border-color:var(–green);background:var(–green-dim);color:var(–green)}
.qz-choice:disabled,.qz-choice[disabled]{cursor:default;opacity:0.7}
.qz-result{font-size:0.8rem;padding:8px 0;flex-shrink:0;text-align:center}
.qz-result.ok{color:var(–green)}.qz-result.ng{color:var(–red)}
.qz-acts{display:flex;gap:7px;justify-content:center;flex-shrink:0}
.qz-stats{font-family:‘Fira Code’,monospace;font-size:0.72rem;color:var(–muted2);margin-bottom:8px}

@media(max-width:480px){
.fc-word{font-size:1.5rem}
.fc-card{padding:20px 16px 16px}
.ov-body{padding:10px 10px 14px}
}
</style>

</head>
<body>

<div id="header">
  <div class="hdr-top">
    <div class="logo">多義語<em>Flash</em></div>
    <div class="hpill">計 <b id="cnt-total">0</b> 語</div>
    <div class="hpill" style="color:var(--red)">覚えた <b id="cnt-l" style="color:var(--red)">0</b></div>
    <div class="hpill" style="color:var(--blue)">苦手 <b id="cnt-d" style="color:var(--blue)">0</b></div>
    <div class="hdr-r">
      <button class="btn btn-purple" onclick="openQZ()">&#10067; クイズ</button>
      <button class="btn" onclick="openQZRandom50()" style="border-color:var(--purple);color:var(--purple)">&#127922; 50問</button>
      <button class="btn btn-gold" onclick="openFC()">&#128199; 暗記</button>
    </div>
  </div>
</div>

<div id="controls">
  <div class="sbox">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="単語を検索…">
  </div>
  <div class="filter-row">
    <button class="fbtn on" onclick="setFilter('all',this)">すべて</button>
    <button class="fbtn fl" onclick="setFilter('learned',this)">○ 覚えた</button>
    <button class="fbtn fm" onclick="setFilter('maybe',this)">? 微妙</button>
    <button class="fbtn fd" onclick="setFilter('difficult',this)">✕ 苦手</button>
    <button class="fbtn" onclick="setFilter('unmarked',this)">未マーク</button>
  </div>
</div>

<div id="sec-bar">
  <span class="sec-label">§</span>
  <button class="sec-btn on" data-sec="0" onclick="setSection(0)">すべて</button>
  <button class="sec-btn" data-sec="1" onclick="setSection(1)">§1<br><span style="font-size:0.54rem;opacity:0.7">1-25</span></button>
  <button class="sec-btn" data-sec="2" onclick="setSection(2)">§2<br><span style="font-size:0.54rem;opacity:0.7">26-47</span></button>
  <button class="sec-btn" data-sec="3" onclick="setSection(3)">§3<br><span style="font-size:0.54rem;opacity:0.7">48-86</span></button>
  <button class="sec-btn" data-sec="4" onclick="setSection(4)">§4<br><span style="font-size:0.54rem;opacity:0.7">87-132</span></button>
  <button class="sec-btn" data-sec="5" onclick="setSection(5)">§5<br><span style="font-size:0.54rem;opacity:0.7">133-159</span></button>
  <button class="sec-btn" data-sec="6" onclick="setSection(6)">§6<br><span style="font-size:0.54rem;opacity:0.7">160-191</span></button>
  <button class="sec-btn" data-sec="7" onclick="setSection(7)">§7<br><span style="font-size:0.54rem;opacity:0.7">192-247</span></button>
  <button class="sec-btn" data-sec="8" onclick="setSection(8)">§8<br><span style="font-size:0.54rem;opacity:0.7">248-294</span></button>
  <button class="sec-btn" data-sec="9" onclick="setSection(9)">§9<br><span style="font-size:0.54rem;opacity:0.7">295-332</span></button>
  <button class="sec-btn" data-sec="10" onclick="setSection(10)">§10<br><span style="font-size:0.54rem;opacity:0.7">333-379</span></button>
  <button class="sec-btn" data-sec="11" onclick="setSection(11)">§11<br><span style="font-size:0.54rem;opacity:0.7">380-409</span></button>
  <button class="sec-btn" data-sec="12" onclick="setSection(12)">§12<br><span style="font-size:0.54rem;opacity:0.7">410-435</span></button>
  <button class="sec-btn" data-sec="13" onclick="setSection(13)">§13<br><span style="font-size:0.54rem;opacity:0.7">436-491</span></button>
  <button class="sec-btn" data-sec="14" onclick="setSection(14)">§14<br><span style="font-size:0.54rem;opacity:0.7">492-520</span></button>
  <button class="sec-btn" data-sec="15" onclick="setSection(15)">§15<br><span style="font-size:0.54rem;opacity:0.7">521-574</span></button>
  <button class="sec-btn" data-sec="16" onclick="setSection(16)">§16<br><span style="font-size:0.54rem;opacity:0.7">575-604</span></button>
  <button class="sec-btn" data-sec="17" onclick="setSection(17)">§17<br><span style="font-size:0.54rem;opacity:0.7">605-638</span></button>
  <button class="sec-btn" data-sec="18" onclick="setSection(18)">§18<br><span style="font-size:0.54rem;opacity:0.7">639-674</span></button>

var exCache={};
var marks={};
try{marks=JSON.parse(localStorage.getItem('poly_marks')||'{}');}catch(e){marks={};}
try{var _ls=localStorage.getItem('poly_examples');if(_ls)exCache=JSON.parse(_ls);}catch(e){}
Object.keys(_EX).forEach(function(k){if(!exCache[k])exCache[k]=_EX[k];});

var S={search:'',filter:'all',sec:0};
var fc={list:[],idx:0,revealed:false};

function exKey(wordId,mIdx){return String(wordId)+'_'+String(mIdx);}
function markKey(id,mIdx){return String(id)+'_'+String(mIdx);}

function getMark(id,mIdx){
  if(mIdx===undefined){
    var w=POLY.find(function(x){return x.id===id;});
    if(!w)return null;
    var counts={learned:0,maybe:0,difficult:0};
    w.meanings.forEach(function(_,i){var v=marks[markKey(id,i)];if(v)counts[v]++;});
    var best=null,max=0;
    Object.keys(counts).forEach(function(k){if(counts[k]>max){max=counts[k];best=k;}});
    return max>0?best:null;
  }
  return marks[markKey(id,mIdx)]||null;
}

function saveMark(id,type,mIdx){
  if(mIdx!==undefined){
    marks[markKey(id,mIdx)]=type;
  } else {
    // FCモード: 全意味に同じマーク
    var w=POLY.find(function(x){return x.id===id;});
    if(w)w.meanings.forEach(function(_,i){marks[markKey(id,i)]=type;});
  }
  try{localStorage.setItem('poly_marks',JSON.stringify(marks));}catch(e){}
  updateStats();
}

function updateStats(){
  var v=Object.values(marks);
  document.getElementById('cnt-l').textContent=v.filter(function(x){return x==='learned';}).length;
  document.getElementById('cnt-d').textContent=v.filter(function(x){return x==='difficult';}).length;
}

function inSection(wordId,sec){
  if(sec===0)return true;
  var r=SEC_RANGES[sec];
  if(!r)return false;
  return wordId>=r[0]&&wordId<=r[1];
}

function setSection(sec){
  S.sec=sec;
  document.querySelectorAll('.sec-btn').forEach(function(b){
    b.classList.toggle('on',parseInt(b.getAttribute('data-sec'))===sec);
  });
  render();
}

function setFilter(f,el){
  S.filter=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('on');});
  if(el)el.classList.add('on');
  render();
}

document.getElementById('search').addEventListener('input',function(){S.search=this.value.trim().toLowerCase();render();});

function getFiltered(){
  var l=POLY.slice();
  if(S.sec>0)l=l.filter(function(w){return inSection(w.id,S.sec);});
  if(S.search)l=l.filter(function(w){return w.en.toLowerCase().includes(S.search);});
  if(S.filter==='learned')l=l.filter(function(w){return w.meanings.some(function(_,i){return getMark(w.id,i)==='learned';});});
  if(S.filter==='maybe')l=l.filter(function(w){return w.meanings.some(function(_,i){return getMark(w.id,i)==='maybe';});});
  if(S.filter==='difficult')l=l.filter(function(w){return w.meanings.some(function(_,i){return getMark(w.id,i)==='difficult';});});
  if(S.filter==='unmarked')l=l.filter(function(w){return w.meanings.every(function(_,i){return !getMark(w.id,i);});});
  return l;
}

function render(){
  var fl=getFiltered();
  document.getElementById('status-text').textContent=fl.length+' 語 / 全'+POLY.length+'語';
  var grid=document.getElementById('list-view');
  grid.innerHTML='';
  if(fl.length===0){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);font-size:0.88rem;">該当なし</div>';
    return;
  }
  fl.forEach(function(w){
    var overallMark=getMark(w.id);
    var card=document.createElement('div');
    card.className='wcard'+(overallMark==='learned'?' st-learned':overallMark==='maybe'?' st-maybe':overallMark==='difficult'?' st-difficult':'');
    card.id='wcard-'+w.id;
    var header='<div class="wc-header" onclick="toggleCard('+w.id+')">'
      +'<div class="wc-top"><span class="wc-en">'+w.en+'</span>'
      +'<span class="wc-cnt">'+w.meanings.length+'意味</span>'
      +'<span class="wc-toggle" id="wc-tog-'+w.id+'">▼</span>'
      +'</div></div>';
    var detail='<div class="wc-detail" id="wc-det-'+w.id+'" style="display:none">';
    w.meanings.forEach(function(meaning,i){
      var mk=getMark(w.id,i);
      var k=String(w.id)+'_'+String(i);
      var ex=exCache[k];
      detail+='<div class="wc-meaning-row" id="wc-mr-'+w.id+'-'+i+'">'
        +'<div class="wc-mi-wrap">'
          +'<span class="wc-mnum">'+(i+1)+'.</span>'
          +'<span class="wc-mtext">'+meaning+'</span>'
        +'</div>'
        +(ex?'<div class="wc-ex-en">'+ex.en+'</div>':'')
        +'<div class="wc-mk-row">'
          +'<button class="mkb mkb-ok'+(mk==='learned'?' on':'')+'" onclick="doMarkMeaning('+w.id+','+i+',\'learned\',event)">○ 覚えた</button>'
          +'<button class="mkb mkb-maybe'+(mk==='maybe'?' on':'')+'" onclick="doMarkMeaning('+w.id+','+i+',\'maybe\',event)">? 微妙</button>'
          +'<button class="mkb mkb-ng'+(mk==='difficult'?' on':'')+'" onclick="doMarkMeaning('+w.id+','+i+',\'difficult\',event)">✕ 苦手</button>'
        +'</div>'
      +'</div>';
    });
    detail+='</div>';
    card.innerHTML=header+detail;
    grid.appendChild(card);
  });
}

function toggleCard(id){
  var det=document.getElementById('wc-det-'+id);
  var tog=document.getElementById('wc-tog-'+id);
  if(!det)return;
  var open=det.style.display==='none';
  det.style.display=open?'block':'none';
  if(tog)tog.textContent=open?'▲':'▼';
}

function doMarkMeaning(id,mIdx,type,e){
  if(e)e.stopPropagation();
  saveMark(id,type,mIdx);
  var row=document.getElementById('wc-mr-'+id+'-'+mIdx);
  if(row){
    row.querySelectorAll('.mkb').forEach(function(b){b.classList.remove('on');});
    var sel=row.querySelector(type==='learned'?'.mkb-ok':type==='maybe'?'.mkb-maybe':'.mkb-ng');
    if(sel)sel.classList.add('on');
  }
  var card=document.getElementById('wcard-'+id);
  if(card){
    var om=getMark(id);
    card.className='wcard'+(om==='learned'?' st-learned':om==='maybe'?' st-maybe':om==='difficult'?' st-difficult':'');
  }
}

// ===== API =====
async function fetchOneExample(en,meaning){
  var prompt='Write one example sentence (8-12 words) for "'+en+'" meaning: "'+meaning+'". Return ONLY JSON: {"en":"sentence","ja":"日本語訳"}';
  var resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:prompt}]})
  });
  var data=await resp.json();
  var txt=(data.content&&data.content[0])?data.content[0].text:'';
  return JSON.parse(txt.replace(/```json|```/g,'').trim());
}

function openFC(){
  var fl=getFiltered();
  if(fl.length===0){alert('表示中の単語がありません');return;}
  fc.list=fl.slice();fc.idx=0;fc.revealed=false;
  openOverlay('fc-overlay');fcShow();
}
function closeFC(){closeOverlay('fc-overlay');render();}

function fcShow(){
  var w=fc.list[fc.idx];
  document.getElementById('fc-pfill').style.width=((fc.idx/fc.list.length)*100).toFixed(1)+'%';
  document.getElementById('fc-ctr').textContent=(fc.idx+1)+' / '+fc.list.length;
  document.getElementById('fc-pos').textContent='#'+w.id;
  document.getElementById('fc-word').textContent=w.en;
  document.getElementById('fc-badge').textContent=w.meanings.length+' meanings';

  // 意味を全部まとめて非表示にセット
  var meaningsDiv=document.getElementById('fc-meanings');
  meaningsDiv.innerHTML='';
  w.meanings.forEach(function(m,i){
    var item=document.createElement('div');
    item.className='fc-meaning-item';
    item.innerHTML='<span class="fc-mnum">'+(i+1)+'.</span><span class="fc-mtext">'+m+'</span>';
    meaningsDiv.appendChild(item);
  });
  meaningsDiv.classList.remove('show');

  document.getElementById('fc-acts').style.display='none';
  document.getElementById('fc-hint').textContent='タップして意味を見る';
  fc.revealed=false;
  document.getElementById('fc-body').scrollTop=0;
}

function fcReveal(){
  if(fc.revealed)return;
  fc.revealed=true;
  document.getElementById('fc-meanings').classList.add('show');
  document.getElementById('fc-acts').style.display='flex';
  document.getElementById('fc-hint').textContent='';
}

function fcNext(){
  if(fc.idx<fc.list.length-1){fc.idx++;fc.revealed=false;fcShow();}
  else{setTimeout(function(){alert('完了！');closeFC();},200);}
}
function fcPrev(){if(fc.idx>0){fc.idx--;fc.revealed=false;fcShow();}}
function fcShuffle(){fc.list.sort(function(){return Math.random()-0.5;});fc.idx=0;fc.revealed=false;fcShow();}
function fcRandom50(){
  var filtered=getFiltered();
  if(filtered.length===0){alert('表示中の単語がありません');return;}
  var shuffled=filtered.slice().sort(function(){return Math.random()-0.5;});
  fc.list=shuffled.slice(0,Math.min(50,shuffled.length));
  fc.idx=0;fc.revealed=false;
  if(document.getElementById('fc-overlay').style.cssText.indexOf('flex')>=0){
    fcShow();
  } else {
    openOverlay('fc-overlay');fcShow();
  }
}

function showFb(type){
  var fb=document.getElementById('fc-fb'),sym=document.getElementById('fc-fbsym');
  if(!fb||!sym)return;
  fb.className='fc-fb';void fb.offsetWidth;
  sym.textContent=type==='learned'?'○':type==='maybe'?'?':'✕';
  fb.className='fc-fb '+(type==='learned'?'l':type==='maybe'?'m':'d')+' show';
  setTimeout(function(){fb.className='fc-fb';},700);
}

function fcMark(type){
  var w=fc.list[fc.idx];
  showFb(type);
  // 全意味に同じマークをつける
  saveMark(w.id,type,undefined);
  setTimeout(fcNext,350);
}

// ===== QUIZ MODE =====
function openQZ(){
  var items=[];
  getFiltered().forEach(function(w){
    w.meanings.forEach(function(m,i){
      var k=exKey(w.id,i);
      if(exCache[k])items.push({w:w,mIdx:i,meaning:m,ex:exCache[k]});
    });
  });
  if(items.length<4){
    alert('例文クイズには例文が4件以上必要です。先に一括生成を実行してください。');
    return;
  }
  items.sort(function(){return Math.random()-0.5;});
  qz.list=items;qz.idx=0;qz.correct=0;qz.total=0;qz.answered=false;
  openOverlay('qz-overlay');qzShow();
}
function closeQZ(){closeOverlay('qz-overlay');render();}

function qzShow(){
  var item=qz.list[qz.idx];
  var total=qz.list.length;
  document.getElementById('qz-pfill').style.width=((qz.idx/total)*100).toFixed(1)+'%';
  document.getElementById('qz-ctr').textContent=(qz.idx+1)+' / '+total;
  document.getElementById('qz-ex-en').textContent=item.ex.en;
  document.getElementById('qz-ex-ja').textContent='';
  document.getElementById('qz-word').textContent=item.w.en;
  document.getElementById('qz-result').textContent='';
  document.getElementById('qz-result').className='qz-result';
  document.getElementById('qz-acts').style.display='none';
  document.getElementById('qz-stats').textContent='正解率: '+qz.correct+'/'+qz.total;
  qz.answered=false;

  var correct=item.meaning;
  var sameWordWrongs=item.w.meanings.filter(function(m,i){return i!==item.mIdx;});
  sameWordWrongs.sort(function(){return Math.random()-0.5;});
  var otherMeanings=[];
  POLY.forEach(function(w){if(w.id!==item.w.id)w.meanings.forEach(function(m){otherMeanings.push(m);});});
  otherMeanings.sort(function(){return Math.random()-0.5;});
  var wrongs=[];
  if(sameWordWrongs.length>0)wrongs.push(sameWordWrongs[0]);
  for(var si=1;si<sameWordWrongs.length&&wrongs.length<3;si++)wrongs.push(sameWordWrongs[si]);
  for(var oi=0;oi<otherMeanings.length&&wrongs.length<3;oi++){
    if(otherMeanings[oi]!==correct)wrongs.push(otherMeanings[oi]);
  }
  wrongs.sort(function(){return Math.random()-0.5;});
  var choices=[correct,wrongs[0],wrongs[1],wrongs[2]].sort(function(){return Math.random()-0.5;});

  var choicesDiv=document.getElementById('qz-choices');
  choicesDiv.innerHTML='';
  choices.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='qz-choice';
    btn.textContent=c;
    btn.onclick=function(){qzAnswer(c,correct);};
    choicesDiv.appendChild(btn);
  });
  document.getElementById('qz-body').scrollTop=0;
}

function qzAnswer(chosen,correct){
  if(qz.answered)return;
  qz.answered=true;qz.total++;
  var isCorrect=(chosen===correct);
  if(isCorrect)qz.correct++;
  var btns=document.getElementById('qz-choices').querySelectorAll('.qz-choice');
  btns.forEach(function(btn){
    btn.setAttribute('disabled','disabled');
    if(btn.textContent===correct){btn.classList.add(isCorrect&&btn.textContent===chosen?'correct':'reveal');}
    else if(btn.textContent===chosen&&!isCorrect){btn.classList.add('wrong');}
  });
  var res=document.getElementById('qz-result');
  res.textContent=isCorrect?'○ 正解！':'✕ 不正解。正解：'+correct;
  res.className='qz-result '+(isCorrect?'ok':'ng');
  document.getElementById('qz-stats').textContent='正解率: '+qz.correct+'/'+qz.total+' ('+Math.round(qz.correct/qz.total*100)+'%)';
  document.getElementById('qz-acts').style.display='flex';
}
function qzNext(){
  if(qz.idx<qz.list.length-1){qz.idx++;qz.answered=false;qzShow();}
  else{setTimeout(function(){alert('完了！ 正解率: '+qz.correct+'/'+qz.total+' ('+Math.round(qz.correct/qz.total*100)+'%)');closeQZ();},200);}
}

// ===== KEYBOARD =====
document.addEventListener('keydown',function(e){
  var fcOv=document.getElementById('fc-overlay');
  var qzOv=document.getElementById('qz-overlay');
  if(fcOv.style.cssText.indexOf('flex')>=0){
    if(e.key===' '||e.key==='ArrowDown'){e.preventDefault();fcReveal();}
    else if(e.key==='ArrowRight')fcNext();
    else if(e.key==='ArrowLeft')fcPrev();
    else if(e.key==='o'||e.key==='O'){if(fc.revealed)fcMark('learned');}
    else if(e.key==='x'||e.key==='X'){if(fc.revealed)fcMark('difficult');}
    else if(e.key==='Escape')closeFC();
  } else if(qzOv.style.cssText.indexOf('flex')>=0){
    if(e.key==='ArrowRight'&&qz.answered)qzNext();
    else if(e.key==='Escape')closeQZ();
  }
});
